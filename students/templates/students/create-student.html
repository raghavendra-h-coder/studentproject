{% extends "base.html" %}

{% block title %}
Create Student
{% endblock %}

{% block content %}

<h2>Create Student</h2>

<form method="POST">

    {% csrf_token %}

    <p>
        Name:
        <input type="text" name="name">
    </p>

    <p>
        Age:
        <input type="number" name="age">
    </p>

    <p>
        Course:
        <input type="text" name="course">
    </p>

    <button type="submit">
        Save Student
    </button>

</form>

{% endblock %}

{% extends "base-bootstrap.html" %}

{% block title %}
Create Student
{% endblock %}

{% block content %}

<h2>Create Student</h2>

<form method="POST">

    {% csrf_token %}

    <div class="mb-3">
    <label for="name" class="form-label">
    Name
    </label>
    <input
        id="name"
        type="text"
        name="name"
        class="form-control">
    </div>

    <div class="mb-3">
        <label for="age" class="form-label">
    Age
    </label>
    <input
        id="age"
        type="text"
        name="age"
        class="form-control">
    </div>

    <div class="mb-3">
    <label for="course" class="form-label">
    Course
    </label>
    <input
        id="course"
        type="text"
        name="course"
        class="form-control">
    </div>

    <button type="submit" class="btn btn-success">
        Save Student
    </button>

</form>

{% endblock %}

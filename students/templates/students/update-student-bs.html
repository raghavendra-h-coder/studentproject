{% extends "base.html" %}

{% block title %}
Update Student
{% endblock %}

{% block content %}

<h2>Update Student</h2>

<form method="POST">

    {% csrf_token %}

    <p>
        Name:
        <input
            type="text"
            name="name"
            value="{{ student.name }}">
    </p>

    <p>
        Age:
        <input
            type="number"
            name="age"
            value="{{ student.age }}">
    </p>

    <p>
        Course:
        <input
            type="text"
            name="course"
            value="{{ student.course }}">
    </p>

    <button type="submit">
        Update Student
    </button>

</form>

{% endblock %}

{% extends "base.html" %}

{% block title %}
Delete Student
{% endblock %}

{% block content %}

<h2>Delete Student Confirmation</h2>
<p>
    Are you sure you want to delete
    <strong>{{ student.name }}</strong>?
</p>
<form method="POST">
    {% csrf_token %}
    <button type="submit">
        Confirm Delete
    </button>
</form>
{% endblock %}
